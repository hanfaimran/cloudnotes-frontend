<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudNotes — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <svg width="36" height="36" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="14" fill="var(--accent)"/>
          <path d="M14 20C14 16.686 16.686 14 20 14H32C35.314 14 38 16.686 38 20V28C38 31.314 35.314 34 32 34H26L20 40V34C16.686 34 14 31.314 14 28V20Z" fill="white" fill-opacity="0.95"/>
          <circle cx="20" cy="24" r="2" fill="var(--accent)"/>
          <circle cx="26" cy="24" r="2" fill="var(--accent)"/>
          <circle cx="32" cy="24" r="2" fill="var(--accent)"/>
        </svg>
        <span class="logo-text">CloudNotes</span>
      </div>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close sidebar">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-filter="all">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z" fill="currentColor"/></svg>
        All Notes
      </button>
      <button class="nav-item" data-filter="pinned">
        <svg viewBox="0 0 20 20" fill="none"><path d="M9.153 3.318L9.5 3h1l.347.318 1 5 .5 .182.5-.182L13.5 4h.5l1.5 1.5v.5L14.318 7.347 14 8H13L9 12v1l-1 1h-1l-1-1v-1l1-1v-1L4 9V8.5L5.5 7H6l.5-.5 .153-.5 1-5 .347-.318L9.153 3.318z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Pinned
      </button>
      <button class="nav-item" data-filter="with-images">
        <svg viewBox="0 0 20 20" fill="none"><path d="M4 3h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1zm0 0v12l4-4 3 3 2-2 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        With Media
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card" id="user-card">
        <div class="user-avatar" id="user-avatar">J</div>
        <div class="user-info">
          <span class="user-name" id="sidebar-username">Loading...</span>
          <span class="user-email" id="sidebar-email">...</span>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Sign out">
        <svg viewBox="0 0 20 20" fill="none"><path d="M13 3H7a2 2 0 00-2 2v10a2 2 0 002 2h6M13 7l4 3-4 3M6 10h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none"><path d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" fill="currentColor"/></svg>
          <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off" />
          <span class="search-clear hidden" id="search-clear">✕</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle theme">
          <svg class="sun-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
          <svg class="moon-icon hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
        <button class="btn-create" id="create-note-btn">
          <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          New Note
        </button>
      </div>
    </header>

    <!-- Notes Area -->
    <div class="notes-area">
      <div class="notes-header">
        <h2 class="section-title" id="section-title">All Notes</h2>
        <div class="view-controls">
          <button class="view-btn active" id="grid-view-btn" title="Grid view">
            <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="view-btn" id="list-view-btn" title="List view">
            <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <div class="notes-grid" id="notes-container">
        <!-- Notes rendered here -->
      </div>

      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="36" fill="var(--accent)" fill-opacity="0.08"/>
            <path d="M24 28C24 24.686 26.686 22 30 22H50C53.314 22 56 24.686 56 28V46C56 49.314 53.314 52 50 52H42L34 60V52C30.686 52 28 49.314 28 46V44" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            <path d="M32 32h16M32 38h10" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 id="empty-title">No notes yet</h3>
        <p id="empty-desc">Create your first note to get started</p>
        <button class="btn-create" onclick="document.getElementById('create-note-btn').click()">
          <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          Create Note
        </button>
      </div>
    </div>
  </main>

  <!-- Overlay -->
  <div class="overlay hidden" id="overlay"></div>

  <!-- Note Modal -->
  <div class="modal hidden" id="note-modal" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">New Note</h3>
        <div class="modal-actions-top">
          <div class="color-picker-group">
            <span class="color-label">Color:</span>
            <div class="color-swatches">
              <button class="swatch active" data-color="#ffffff" style="background:#ffffff" title="White"></button>
              <button class="swatch" data-color="#fef3c7" style="background:#fef3c7" title="Yellow"></button>
              <button class="swatch" data-color="#dcfce7" style="background:#dcfce7" title="Green"></button>
              <button class="swatch" data-color="#dbeafe" style="background:#dbeafe" title="Blue"></button>
              <button class="swatch" data-color="#fce7f3" style="background:#fce7f3" title="Pink"></button>
              <button class="swatch" data-color="#ede9fe" style="background:#ede9fe" title="Purple"></button>
              <button class="swatch" data-color="#fee2e2" style="background:#fee2e2" title="Red"></button>
            </div>
          </div>
          <button class="icon-btn" id="modal-close">
            <svg viewBox="0 0 20 20" fill="none"><path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <div class="modal-body">
        <input type="text" class="note-title-input" id="note-title" placeholder="Note title..." maxlength="255" />
        <textarea class="note-content-input" id="note-content" placeholder="Write your thoughts here..." rows="8"></textarea>

        <!-- Media Preview -->
        <div class="media-preview" id="media-preview">
          <div class="image-preview-wrap hidden" id="image-preview-wrap">
            <img src="" alt="Preview" id="image-preview-img" />
            <button class="remove-media" id="remove-image" title="Remove image">✕</button>
          </div>
          <div class="file-preview-wrap hidden" id="file-preview-wrap">
            <svg viewBox="0 0 20 20" fill="none"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" stroke="currentColor" stroke-width="1.5"/></svg>
            <span id="file-preview-name">filename.pdf</span>
            <button class="remove-media" id="remove-file" title="Remove file">✕</button>
          </div>
        </div>

        <!-- Upload Controls -->
        <div class="upload-controls">
          <label class="upload-btn" for="image-upload" title="Upload image">
            <svg viewBox="0 0 20 20" fill="none"><path d="M4 3h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1zm0 0v12l4-4 3 3 2-2 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7.5" cy="7.5" r="1.5" fill="currentColor"/></svg>
            Photo
            <input type="file" id="image-upload" accept="image/*" hidden />
          </label>
          <label class="upload-btn" for="file-upload" title="Upload file">
            <svg viewBox="0 0 20 20" fill="none"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" stroke="currentColor" stroke-width="1.5"/><path d="M9 9l1 1 1-3 2 4H8l1-2z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            File
            <input type="file" id="file-upload" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.zip" hidden />
          </label>
          <label class="pin-toggle" id="pin-toggle" title="Pin note">
            <input type="checkbox" id="note-pinned" hidden />
            <svg viewBox="0 0 20 20" fill="none"><path d="M9.153 3.318L9.5 3h1l.347.318 1 5 .5.182.5-.182 1.153-4.318L14.5 4H15l1.5 1.5v.5L14.818 7.347 14.5 8h-.5L10 12v1l-1 1H8l-1-1v-1l1-1v-1L4 9V8.5L5.5 7H6l.5-.5.153-.5 1-5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            <span id="pin-label">Pin</span>
          </label>
        </div>

        <div class="error-msg" id="modal-error"></div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="cancel-note-btn">Cancel</button>
        <button class="btn-primary" id="save-note-btn">
          <span class="btn-text">Save Note</span>
          <span class="btn-loader hidden">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="60" stroke-dashoffset="20"/></svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal hidden" id="delete-modal">
    <div class="modal-backdrop" id="delete-backdrop"></div>
    <div class="modal-box small">
      <div class="modal-header">
        <h3 class="modal-title">Delete Note?</h3>
      </div>
      <div class="modal-body">
        <p style="color: var(--text-secondary); line-height: 1.6;">This action cannot be undone. The note and all its attachments will be permanently deleted.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancel-delete-btn">Cancel</button>
        <button class="btn-danger" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
