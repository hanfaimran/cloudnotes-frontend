<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudNotes — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="noise"></div>

  <div class="auth-layout">
    <!-- Left Panel -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="logo-mark">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
            <rect width="52" height="52" rx="14" fill="white" fill-opacity="0.12"/>
            <path d="M14 20C14 16.686 16.686 14 20 14H32C35.314 14 38 16.686 38 20V28C38 31.314 35.314 34 32 34H26L20 40V34C16.686 34 14 31.314 14 28V20Z" fill="white" fill-opacity="0.9"/>
            <circle cx="20" cy="24" r="2" fill="#6366f1"/>
            <circle cx="26" cy="24" r="2" fill="#6366f1"/>
            <circle cx="32" cy="24" r="2" fill="#6366f1"/>
          </svg>
        </div>
        <h1 class="brand-name">CloudNotes</h1>
        <p class="brand-tagline">Your thoughts,<br>beautifully organized.</p>

        <div class="feature-list">
          <div class="feature-item">
            <span class="feature-icon">✦</span>
            <span>Rich notes with image & file uploads</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">✦</span>
            <span>Instant full-text search</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">✦</span>
            <span>Pin, color-code & organize</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">✦</span>
            <span>Dark mode & responsive design</span>
          </div>
        </div>
      </div>
      <div class="brand-orb orb-1"></div>
      <div class="brand-orb orb-2"></div>
    </div>

    <!-- Right Panel -->
    <div class="auth-form-panel">
      <div class="form-container">
        <div class="form-tabs">
          <button class="tab active" data-tab="login">Sign In</button>
          <button class="tab" data-tab="signup">Create Account</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="login-form">
          <div class="form-header">
            <h2>Welcome back</h2>
            <p>Sign in to your CloudNotes account</p>
          </div>

          <div class="field-group">
            <label for="login-email">Email</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M3 5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5zm2 0l5 4 5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
            </div>
          </div>

          <div class="field-group">
            <label for="login-password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M5 9V7a5 5 0 0110 0v2M5 9a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H5zm5 4a1 1 0 100-2 1 1 0 000 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" required />
            </div>
          </div>

          <div class="error-msg" id="login-error"></div>

          <button type="submit" class="btn-primary" id="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader hidden">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="60" stroke-dashoffset="20"/></svg>
            </span>
          </button>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="signup-form">
          <div class="form-header">
            <h2>Get started free</h2>
            <p>Create your CloudNotes account today</p>
          </div>

          <div class="field-group">
            <label for="signup-name">Full Name</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="text" id="signup-name" placeholder="Jane Doe" autocomplete="name" required />
            </div>
          </div>

          <div class="field-group">
            <label for="signup-email">Email</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M3 5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5zm2 0l5 4 5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required />
            </div>
          </div>

          <div class="field-group">
            <label for="signup-password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M5 9V7a5 5 0 0110 0v2M5 9a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H5zm5 4a1 1 0 100-2 1 1 0 000 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password" required />
            </div>
          </div>

          <div class="error-msg" id="signup-error"></div>

          <button type="submit" class="btn-primary" id="signup-btn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader hidden">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="60" stroke-dashoffset="20"/></svg>
            </span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
